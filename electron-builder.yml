appId: com.getoptaris.desktop
copyright: Copyright © 2026 GetOptaris
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  # The gateway sidecar ships via extraResources (below), not inside the asar.
  # Excluding it here keeps the ~10-20MB binary from being packed twice.
  - '!resources/bin/**'
  # Repo-only files not needed at runtime — docs, tooling config, and the Go
  # sidecar *source* (only its compiled binary ships, via extraResources below).
  - '!gateway'
  - '!scripts'
  - '!.claude'
  - '!{CLAUDE.md,README.zh-CN.md,components.json,pnpm-workspace.yaml}'
asarUnpack:
  - resources/**
# Ship the compiled gateway sidecar outside the asar, into <resources>/bin. This
# maps to process.resourcesPath/bin, which is exactly the packaged path that
# resolveBinaryPath() in src/main/gateway.ts looks the binary up at. Build the
# binary first via the build:gateway:<os> scripts so this directory exists.
#
# build-gateway.sh writes to resources/bin/<arch>/ (arm64 or x64). The ${arch} macro
# expands per build pass, so a single `electron-builder --mac --arm64 --x64` picks the
# matching per-arch binary while emitting one combined latest-mac.yml. Both mac arches
# ship in one pass and share one auto-update feed. It flattens to <resources>/bin, so
# resolveBinaryPath()'s packaged branch is unchanged.
extraResources:
  - from: resources/bin/${arch}
    to: bin
win:
  executableName: Optaris
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  # Signing the app also deep-signs the embedded gateway binary under Resources/bin
  # (hardened runtime). entitlements.mac.plist grants disable-library-validation for
  # that case. Notarization stays off so credential-less local packaging is not
  # blocked; enable it (and provide APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD /
  # APPLE_TEAM_ID, or an API key) for distribution builds.
  notarize: false
dmg:
  # ${arch} keeps the arm64 and x64 DMGs from overwriting each other, since macOS is
  # shipped as two separate per-arch artifacts rather than a universal build.
  artifactName: ${name}-${version}-${arch}.${ext}
linux:
  # AppImage carries the electron-updater feed (latest-linux.yml) so it self-updates;
  # deb is a manual-install package. snap is intentionally omitted — it needs snapcraft
  # in CI and its updates are managed by the Snap Store, not electron-updater.
  target:
    - AppImage
    - deb
  # maintainer/description default to package.json author/description.
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
# publish (github provider) is derived from package.json "repository".
